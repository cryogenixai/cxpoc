# GPU stack (EC2 g5.xlarge). Adds the vLLM sidecar serving the model from the
# mounted EBS volume. The pipeline image is the `gpu` build target.
#
#   MODEL=Qwen/Qwen2.5-VL-7B-Instruct docker compose -f docker-compose.gpu.yml up
#
# Swap models by changing MODEL (and pointing at the volume copy) — no rebuild.
services:
  vllm:
    image: vllm/vllm-openai:latest
    command:
      - "--model=${MODEL:-Qwen/Qwen2.5-VL-7B-Instruct}"
      - "--quantization=bitsandbytes"
      - "--port=8000"
    ports:
      - "8000:8000"
    volumes:
      - /models:/models          # EBS volume with pulled weights
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  pipeline:
    build:
      context: .
      target: gpu
    depends_on:
      - vllm
    environment:
      - VLM_BASE_URL=http://vllm:8000/v1
      - VLM_MODEL=${MODEL:-Qwen/Qwen2.5-VL-7B-Instruct}
      - AWS_DEFAULT_REGION=us-east-1   # real S3 via the VM's IAM role
    volumes:
      - /models:/models
